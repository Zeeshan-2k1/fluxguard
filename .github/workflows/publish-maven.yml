name: Publish Maven Central

on:
  release:
    types: [published]

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Do not pass server-id / credentials here — setup-java can merge servers into
      # ~/.m2/settings.xml (e.g. encrypted gpg.passphrase) which then requires
      # ~/.m2/settings-security.xml to decrypt.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # maven-gpg-plugin defaults to passphraseServerId=gpg.passphrase; it must find a
      # *plaintext* password for that server id, or it tries to decrypt {enc}... and fails.
      # Sonatype user token; server id must match central-publishing-maven-plugin publishingServerId
      - name: Write ~/.m2/settings.xml (Central + gpg.passphrase, plaintext)
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          if [ -z "${MAVEN_USERNAME:-}" ] || [ -z "${MAVEN_PASSWORD:-}" ]; then
            echo "MAVEN_USERNAME and MAVEN_PASSWORD repository secrets must be set (Sonatype user token)." >&2
            exit 1
          fi
          rm -f ~/.m2/settings.xml ~/.m2/settings-security.xml
          python3 <<'PY'
          import os
          from pathlib import Path
          from xml.sax.saxutils import escape

          def norm(s: str) -> str:
              return s.replace("\r", "").strip()

          user = escape(norm(os.environ["MAVEN_USERNAME"]))
          password = escape(norm(os.environ["MAVEN_PASSWORD"]))
          gpg_pass = escape(norm(os.environ["MAVEN_GPG_PASSPHRASE"]))
          m2 = Path.home() / ".m2"
          m2.mkdir(parents=True, exist_ok=True)
          xml = f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>{user}</username>
                <password>{password}</password>
              </server>
              <server>
                <id>gpg.passphrase</id>
                <password>{gpg_pass}</password>
              </server>
            </servers>
          </settings>
          """
          (m2 / "settings.xml").write_text(xml, encoding="utf-8")
          PY

      - name: Import GPG signing key and configure headless GPG
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent 2>/dev/null || true
          gpgconf --launch gpg-agent
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --no-tty --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Set release version from tag
        id: version
        working-directory: packages/fluxguard-java
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Empty version from tag: $TAG" >&2
            exit 1
          fi
          chmod +x mvnw
          ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy to Maven Central (Central Publisher)
        working-directory: packages/fluxguard-java
        run: |
          # Drop any file that would make Maven try to decrypt {enc}... passwords
          rm -f ~/.m2/settings-security.xml
          export MAVEN_GPG_PASSPHRASE="${MAVEN_GPG_PASSPHRASE//$'\r'/}"
          export MAVEN_GPG_PASSPHRASE="${MAVEN_GPG_PASSPHRASE%$'\n'}"
          ./mvnw -B -P release clean deploy
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
