name: Publish Maven Central

on:
  release:
    types: [published]

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      # Import key here instead of setup-java gpg-* inputs: those write an encrypted
      # passphrase into settings.xml which requires ~/.m2/settings-security.xml to decrypt.
      - name: Import GPG signing key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --no-tty --import
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      - name: Set release version from tag
        id: version
        working-directory: packages/fluxguard-java
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Empty version from tag: $TAG" >&2
            exit 1
          fi
          chmod +x mvnw
          ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Deploy to OSSRH (Maven Central)
        working-directory: packages/fluxguard-java
        run: ./mvnw -B -P release clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
