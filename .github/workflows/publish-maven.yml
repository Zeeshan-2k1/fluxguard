name: Publish Maven Central

on:
  release:
    types: [published]

jobs:
  maven:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Do not pass server-id / credentials here — setup-java merges servers into
      # ~/.m2/settings.xml and can leave encrypted gpg.passphrase entries that
      # require ~/.m2/settings-security.xml to decrypt.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Write ~/.m2/settings.xml (OSSRH only, plaintext servers)
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          from xml.sax.saxutils import escape

          user = escape(os.environ["MAVEN_USERNAME"])
          password = escape(os.environ["MAVEN_PASSWORD"])
          m2 = Path.home() / ".m2"
          m2.mkdir(parents=True, exist_ok=True)
          xml = f"""<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>ossrh</id>
                <username>{user}</username>
                <password>{password}</password>
              </server>
            </servers>
          </settings>
          """
          (m2 / "settings.xml").write_text(xml, encoding="utf-8")
          PY

      - name: Import GPG signing key and configure headless GPG
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent 2>/dev/null || true
          gpgconf --launch gpg-agent
          echo "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --no-tty --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: Set release version from tag
        id: version
        working-directory: packages/fluxguard-java
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            echo "Empty version from tag: $TAG" >&2
            exit 1
          fi
          chmod +x mvnw
          ./mvnw -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy to OSSRH (Maven Central)
        working-directory: packages/fluxguard-java
        run: |
          export MAVEN_GPG_PASSPHRASE="${MAVEN_GPG_PASSPHRASE//$'\r'/}"
          export MAVEN_GPG_PASSPHRASE="${MAVEN_GPG_PASSPHRASE%$'\n'}"
          ./mvnw -B -P release clean deploy
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
