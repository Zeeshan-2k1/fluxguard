name: Publish npm

on:
  release:
    types: [published]

jobs:
  npm:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://127.0.0.1:6379
      CI: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - run: pnpm run lint
      - name: Align package.json version with release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          cd packages/fluxguard-node
          # Allow tag version to match package.json already (e.g. both 0.1.0)
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish fluxguard to npm
        run: pnpm publish packages/fluxguard-node --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
